<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors!</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <h1>Rock, Paper, Scissors!</h1>
        <div class="choices">
            <button class="choice" data-choice="Rock">Rock</button>
            <button class="choice" data-choice="Paper">Paper</button>
            <button class="choice" data-choice="Scissors">Scissors</button>
        </div>
        <div class="scores">
            <div data-player="player">
                <span>Player</span>
                <span id="player-score"></span>
            </div>
            <div data-player="computer">
                <span>Computer</span>
                <span id="opponent-score"></span>
            </div>
        </div>
    </div>
</body>
</html>
